<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF8F00">
  <title>Festivals - Mummiji Daily Pooja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="festival">
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main" class="app-shell">
    <header class="page-header">
      <a class="back-link" href="index.html" aria-label="Go home">‹</a>
      <div>
        <p class="eyebrow">Festivals</p>
        <h1>Vrat and festival guide</h1>
      </div>
    </header>

    <section class="card countdown-card" aria-labelledby="nextFestivalTitle">
      <p class="eyebrow">Next Festival</p>
      <h2 id="nextFestivalTitle">Loading</h2>
      <p id="nextFestivalDate">Please wait</p>
      <div class="countdown" id="festivalCountdown">-- days</div>
    </section>

    <section class="festival-grid" id="festivalGrid" aria-label="Festival list"></section>
  </main>

  <div class="modal" id="festivalModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-card">
      <button class="icon-button modal-close" id="modalClose" type="button" aria-label="Close">×</button>
      <p class="eyebrow" id="modalDate">Festival</p>
      <h2 id="modalTitle">Festival details</h2>
      <p id="modalDescription"></p>
      <h3>Simple pooja</h3>
      <ul id="modalSteps"></ul>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Primary navigation">
    <a href="index.html" data-nav="home"><span>⌂</span>Home</a>
    <a href="calendar.html" data-nav="calendar"><span>□</span>Calendar</a>
    <a href="read.html" data-nav="read"><span>☰</span>Read</a>
    <a href="festival.html" data-nav="festival"><span>✦</span>Festivals</a>
    <a href="settings.html" data-nav="settings"><span>⚙</span>Settings</a>
  </nav>
  <script src="script.js"></script>
</body>
</html>
