<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF8F00">
  <title>Read - Mummiji Daily Pooja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="read">
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main" class="app-shell">
    <header class="page-header">
      <a class="back-link" href="index.html" aria-label="Go home">‹</a>
      <div>
        <p class="eyebrow">Read</p>
        <h1>Chalisa, Aarti and Mantras</h1>
      </div>
    </header>

    <section class="reader-toolbar" aria-label="Reading controls">
      <button class="control-button" id="readerTheme" type="button">☾ Dark</button>
      <button class="control-button" id="decreaseReader" type="button">A−</button>
      <button class="control-button" id="increaseReader" type="button">A+</button>
      <button class="control-button" id="bookmarkButton" type="button">♡ Save</button>
    </section>

    <section class="category-strip" id="categoryStrip" aria-label="Deity categories"></section>

    <section class="content-tabs" id="contentTabs" aria-label="Reading type"></section>

    <article class="card reading-card" id="readingCard" aria-labelledby="readingTitle">
      <p class="eyebrow" id="readingType">Chalisa</p>
      <h2 id="readingTitle">Select a path</h2>
      <div class="reading-text" id="readingText"></div>
    </article>

    <button class="scroll-top" id="scrollTop" type="button" aria-label="Scroll to top">↑</button>
  </main>

  <nav class="bottom-nav" aria-label="Primary navigation">
    <a href="index.html" data-nav="home"><span>⌂</span>Home</a>
    <a href="calendar.html" data-nav="calendar"><span>□</span>Calendar</a>
    <a href="read.html" data-nav="read"><span>☰</span>Read</a>
    <a href="festival.html" data-nav="festival"><span>✦</span>Festivals</a>
    <a href="settings.html" data-nav="settings"><span>⚙</span>Settings</a>
  </nav>
  <script src="script.js"></script>
</body>
</html>
